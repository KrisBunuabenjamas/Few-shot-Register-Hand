<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASL Hand Gesture Recognition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      padding: 14px 24px;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; color: #fff; }
    .badge {
      font-size: 0.7rem;
      background: #3b82f6;
      color: #fff;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 53px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #1a1d27;
      border-right: 1px solid #2a2d3a;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #22263a;
      border: 1px solid #2e3250;
      border-radius: 10px;
      padding: 14px;
    }
    .card h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #8891b4;
      margin-bottom: 10px;
    }

    label { font-size: 0.85rem; color: #c0c8e8; display: block; margin-bottom: 4px; }
    input[type=text], select, input[type=number] {
      width: 100%;
      background: #13152080;
      border: 1px solid #3a3f60;
      color: #e0e0f0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.85rem;
      outline: none;
    }
    input[type=text]:focus, select:focus, input[type=number]:focus {
      border-color: #3b82f6;
    }

    .row { display: flex; gap: 8px; margin-top: 8px; }
    .row > * { flex: 1; }

    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background .15s;
      width: 100%;
    }
    button:hover { background: #2563eb; }
    button.secondary {
      background: #2e3250;
      color: #c0c8e8;
    }
    button.secondary:hover { background: #3a3f60; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: #1e2236;
      border: 1px solid #3a3f60;
      color: #8891b4;
    }
    .status-chip.ok { border-color: #22c55e; color: #22c55e; background: #052e16; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #8891b4;
      margin-top: 4px;
    }
    .info-row span:last-child { color: #c0c8e8; }

    /* ── Main ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cam-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080a10;
      overflow: hidden;
    }
    #camStream {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }
    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #3a3f60;
    }
    .cam-placeholder svg { width: 64px; height: 64px; }
    .cam-placeholder p { font-size: 0.9rem; }

    .pred-overlay {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #000000cc;
      border: 1px solid #3b82f680;
      border-radius: 12px;
      padding: 12px 28px;
      text-align: center;
      display: none;
    }
    .pred-class {
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .pred-conf {
      font-size: 0.78rem;
      color: #8891b4;
      margin-top: 4px;
    }
    .votes-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 6px;
    }
    .vote-chip {
      font-size: 0.7rem;
      background: #3b82f620;
      border: 1px solid #3b82f650;
      color: #93c5fd;
      padding: 1px 8px;
      border-radius: 999px;
    }

    .bottom-bar {
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      padding: 8px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #camBtn { max-width: 160px; }
    #statusTxt { font-size: 0.8rem; color: #8891b4; }

    /* ── Stats table ── */
    .stats-wrap { overflow-x: auto; margin-top: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    th { text-align: left; color: #8891b4; font-weight: 500; padding: 4px 8px; border-bottom: 1px solid #2e3250; }
    td { padding: 3px 8px; color: #c0c8e8; }
    tr:hover td { background: #ffffff08; }
    .acc-bar-wrap { width: 80px; background: #1e2236; border-radius: 99px; height: 6px; display: inline-block; vertical-align: middle; }
    .acc-bar { height: 100%; border-radius: 99px; background: #3b82f6; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e2236;
      border: 1px solid #3a3f60;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #e0e0f0;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: #ef4444; color: #fca5a5; }

    button.success { background: #22c55e; }
    button.success:hover { background: #16a34a; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .capture-count {
      display: inline-block;
      background: #3b82f620;
      border: 1px solid #3b82f650;
      color: #93c5fd;
      border-radius: 999px;
      padding: 1px 10px;
      font-size: 0.78rem;
      margin-left: 6px;
    }
    #registerStatus { margin-top: 8px; font-size: .8rem; color: #8891b4; min-height: 1.2em; }
  </style>
</head>
<body>

<header>
  <h1>ASL Hand Gesture Recognition</h1>
  <span class="badge">KNN · MediaPipe</span>
</header>

<div class="layout">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- Training data -->
    <div class="card">
      <h2>Training Data</h2>
      <label>Load from file path</label>
      <input type="text" id="trainingPath" placeholder="C:\path\to\training.json" />
      <button type="button" style="margin-top:8px" onclick="loadByPath()">Load JSON</button>

      <div style="margin:10px 0;text-align:center;color:#3a3f60;font-size:.8rem">— or upload —</div>

      <label for="fileUpload" style="cursor:pointer">
        <div style="border:1px dashed #3a3f60;border-radius:6px;padding:10px;text-align:center;font-size:.82rem;color:#8891b4;transition:.15s"
             id="dropZone">
          Click to upload JSON
        </div>
      </label>
      <input type="file" id="fileUpload" accept=".json" style="display:none" onchange="uploadFile(this)" />

      <div id="trainingStatus" style="margin-top:10px">
        <span class="status-chip" id="trainingChip"><span class="dot"></span>Not loaded</span>
      </div>
      <div class="info-row" id="trainingInfo" style="display:none">
        <span>Samples</span><span id="samplesCount">—</span>
      </div>
    </div>

    <!-- KNN settings -->
    <div class="card">
      <h2>KNN Settings</h2>
      <div class="row">
        <div>
          <label>K</label>
          <input type="number" id="kVal" value="3" min="1" max="20" />
        </div>
        <div>
          <label>Metric</label>
          <select id="metricVal">
            <option value="euclidean">Euclidean</option>
            <option value="cosine">Cosine</option>
            <option value="manhattan">Manhattan</option>
            <option value="mse">MSE</option>
          </select>
        </div>
      </div>
      <button type="button" style="margin-top:8px" onclick="applySettings()">Apply</button>
    </div>

    <!-- Register Gesture -->
    <div class="card">
      <h2>Register New Gesture</h2>
      <label>Gesture class name</label>
      <input type="text" id="gestureClassName" placeholder="e.g. thumbs_up" />
      <label style="margin-top:8px">Capture delay</label>
      <select id="captureDelay" onchange="updateRecordAvailability()">
        <option value="0">No delay</option>
        <option value="5">5 seconds</option>
        <option value="10">10 seconds</option>
      </select>
      <label style="margin-top:8px">Auto samples</label>
      <select id="autoSampleCount">
        <option value="10">10 samples</option>
        <option value="20">20 samples</option>
        <option value="30">30 samples</option>
      </select>
      <div class="row">
        <button type="button" onclick="captureGestureSample()" id="captureBtn">
          Capture <span class="capture-count" id="captureCount">0</span>
        </button>
        <button type="button" class="secondary" onclick="clearPending()">Clear</button>
      </div>
      <button type="button" style="margin-top:8px" onclick="recordGestureSamples()" id="recordBtn">
        Record Samples
      </button>
      <div class="row">
        <button type="button" class="success" id="commitBtn" onclick="commitGesture()" disabled>Add Gesture</button>
        <button type="button" class="secondary" onclick="saveTraining()">Save to disk</button>
      </div>
      <label style="margin-top:8px">Saved gesture classes</label>
      <div class="row">
        <select id="deleteClassName">
          <option value="">No classes loaded</option>
        </select>
        <button type="button" class="danger" onclick="deleteGestureClass()">Delete</button>
      </div>
      <div id="registerStatus"></div>
    </div>

    <!-- Class stats -->
    <div class="card" style="flex:1;min-height:0">
      <h2>Evaluation Stats <button type="button" class="secondary" style="width:auto;padding:2px 10px;font-size:.7rem" onclick="loadStats()">Load</button></h2>
      <div id="statsArea" style="color:#8891b4;font-size:.82rem;margin-top:6px">
        Click Load to show evaluation_results.json stats.
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="cam-area" id="camArea">
      <div class="cam-placeholder" id="camPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <p>Click <strong>Start Camera</strong> to begin</p>
      </div>
      <img id="camStream" src="" alt="Camera feed" />
      <div class="pred-overlay" id="predOverlay">
        <div class="pred-class" id="predClass">—</div>
        <div class="pred-conf" id="predConf"></div>
        <div class="votes-row" id="predVotes"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <button type="button" id="camBtn" onclick="toggleCamera()">Start Camera</button>
      <span id="statusTxt">Camera off</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let camOn = false;
let pollTimer = null;
let currentClasses = {};
const formStateFields = ['trainingPath', 'gestureClassName', 'captureDelay', 'autoSampleCount', 'kVal', 'metricVal'];

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}

// ── Training ──────────────────────────────────────────────────────────────────
async function loadByPath() {
  const path = document.getElementById('trainingPath').value.trim();
  if (!path) return showToast('Enter a file path', true);
  const r = await fetch('/load_training', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path}),
  });
  const d = await r.json();
  if (d.ok) {
    setTrainingLoaded(d.samples);
    setClassOptions(d.classes);
    if (d.path) document.getElementById('trainingPath').value = d.path;
    saveFormState();
    showToast(`Loaded ${d.samples} samples`);
  } else {
    showToast(d.error, true);
  }
}

async function uploadFile(input) {
  const f = input.files[0];
  if (!f) return;
  const fd = new FormData();
  fd.append('file', f);
  const r = await fetch('/upload_training', {method: 'POST', body: fd});
  const d = await r.json();
  if (d.ok) {
    setTrainingLoaded(d.samples);
    setClassOptions(d.classes);
    if (d.path) document.getElementById('trainingPath').value = d.path;
    saveFormState();
    showToast(`Loaded ${d.samples} samples from ${f.name}`);
  } else {
    showToast(d.error, true);
  }
}

function setTrainingLoaded(n) {
  const chip = document.getElementById('trainingChip');
  chip.className = 'status-chip ok';
  chip.innerHTML = '<span class="dot"></span>Loaded';
  document.getElementById('trainingInfo').style.display = 'flex';
  document.getElementById('samplesCount').textContent = n;
}

// ── Settings ──────────────────────────────────────────────────────────────────
async function applySettings() {
  const k = parseInt(document.getElementById('kVal').value);
  const metric = document.getElementById('metricVal').value;
  await fetch('/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({k, metric}),
  });
  saveFormState();
  showToast(`K=${k}, metric=${metric}`);
}

// ── Camera ────────────────────────────────────────────────────────────────────
function toggleCamera() {
  if (camOn) stopCamera();
  else startCamera();
}

function startCamera() {
  const stream = document.getElementById('camStream');
  const btn = document.getElementById('camBtn');
  const placeholder = document.getElementById('camPlaceholder');

  stream.src = '/video_feed?' + Date.now();
  stream.style.display = 'block';
  placeholder.style.display = 'none';
  document.getElementById('predOverlay').style.display = 'block';

  btn.textContent = 'Stop Camera';
  btn.className = 'danger';
  document.getElementById('statusTxt').textContent = 'Camera on';
  camOn = true;

  pollTimer = setInterval(pollPrediction, 300);
}

function stopCamera() {
  const stream = document.getElementById('camStream');
  const btn = document.getElementById('camBtn');

  fetch('/stop_camera', {method: 'POST'});
  stream.src = '';
  stream.style.display = 'none';
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('predOverlay').style.display = 'none';

  btn.textContent = 'Start Camera';
  btn.className = '';
  document.getElementById('statusTxt').textContent = 'Camera off';
  camOn = false;

  clearInterval(pollTimer);
}

// ── Prediction polling ────────────────────────────────────────────────────────
async function pollPrediction() {
  try {
    const r = await fetch('/prediction');
    const d = await r.json();
    if (d.class) {
      document.getElementById('predClass').textContent = d.class;
      document.getElementById('predConf').textContent =
        `${d.hand_count || 0} hand(s) - confidence: ${d.confidence.toFixed(2)}`;
      const votesEl = document.getElementById('predVotes');
      votesEl.innerHTML = d.votes.map(v => `<span class="vote-chip">${v}</span>`).join('');
    } else {
      document.getElementById('predClass').textContent = '—';
      document.getElementById('predConf').textContent =
        d.hand_count ? `${d.hand_count} hand(s) detected - no matching samples` : 'No hand detected';
      document.getElementById('predVotes').innerHTML = '';
    }
  } catch (_) {}
}

// ── Register Gesture ──────────────────────────────────────────────────────────
function updateCaptureUI(count) {
  document.getElementById('captureCount').textContent = count;
  document.getElementById('commitBtn').disabled = count < 1;
}

function saveFormState() {
  for (const id of formStateFields) {
    const el = document.getElementById(id);
    if (el) localStorage.setItem(`asl_${id}`, el.value);
  }
}

function restoreFormState() {
  for (const id of formStateFields) {
    const el = document.getElementById(id);
    const value = localStorage.getItem(`asl_${id}`);
    if (el && value !== null) el.value = value;
  }
}

function bindFormState() {
  for (const id of formStateFields) {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', saveFormState);
      el.addEventListener('change', saveFormState);
    }
  }
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

function setClassOptions(classes = {}) {
  currentClasses = classes || {};
  const select = document.getElementById('deleteClassName');
  const entries = Object.entries(currentClasses).sort((a, b) => a[0].localeCompare(b[0]));
  if (!entries.length) {
    select.innerHTML = '<option value="">No classes loaded</option>';
    return;
  }
  select.innerHTML = entries
    .map(([cls, count]) => `<option value="${escapeHtml(cls)}">${escapeHtml(cls)} (${count})</option>`)
    .join('');
}

function updateRecordAvailability() {
  const delay = parseInt(document.getElementById('captureDelay').value, 10) || 0;
  const recordBtn = document.getElementById('recordBtn');
  recordBtn.disabled = delay === 0;
  recordBtn.title = delay === 0 ? 'Select 5 or 10 seconds delay before recording multiple samples.' : '';
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function setCaptureBusy(isBusy) {
  document.getElementById('captureBtn').disabled = isBusy;
  document.getElementById('recordBtn').disabled =
    isBusy || (parseInt(document.getElementById('captureDelay').value, 10) || 0) === 0;
}

async function waitForCaptureDelay(statusEl, label = 'Capturing') {
  const delay = parseInt(document.getElementById('captureDelay').value, 10) || 0;
  for (let remaining = delay; remaining > 0; remaining--) {
    if (!camOn) {
      statusEl.textContent = 'Capture cancelled because the camera stopped.';
      return false;
    }
    statusEl.textContent = `${label} in ${remaining} second(s)...`;
    await sleep(1000);
  }
  if (!camOn) {
    statusEl.textContent = 'Capture cancelled because the camera stopped.';
    return false;
  }
  return true;
}

async function requestCaptureSample(className) {
  const r = await fetch('/capture_sample', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({class_name: className}),
  });
  const d = await r.json();
  if (!d.ok) {
    throw new Error(d.error || `Capture failed (${r.status})`);
  }
  return d;
}

function validateCaptureInputs() {
  const className = document.getElementById('gestureClassName').value.trim();
  if (!className) return showToast('Enter a gesture class name first', true);
  if (!camOn) return showToast('Start the camera first', true);
  return className;
}

async function captureGestureSample() {
  const className = validateCaptureInputs();
  if (!className) return;
  const statusEl = document.getElementById('registerStatus');
  setCaptureBusy(true);
  try {
    if (!await waitForCaptureDelay(statusEl, 'Capturing')) return;
    statusEl.textContent = 'Capturing...';
    const d = await requestCaptureSample(className);
    updateCaptureUI(d.count);
    statusEl.textContent =
      `${d.count} sample(s) captured for "${className}" - ${d.hand_count} hand(s)`;
  } catch (err) {
    const msg = err.message || 'Capture request failed. Check that the Flask server is still running.';
    statusEl.textContent = msg;
    showToast(msg, true);
  } finally {
    setCaptureBusy(false);
  }
}

async function recordGestureSamples() {
  const className = validateCaptureInputs();
  if (!className) return;
  const statusEl = document.getElementById('registerStatus');
  const delay = parseInt(document.getElementById('captureDelay').value, 10) || 0;
  if (delay === 0) {
    const msg = 'Select 5 or 10 seconds delay before recording multiple samples.';
    statusEl.textContent = msg;
    showToast(msg, true);
    updateRecordAvailability();
    return;
  }
  const target = parseInt(document.getElementById('autoSampleCount').value, 10) || 10;
  setCaptureBusy(true);
  try {
    if (!await waitForCaptureDelay(statusEl, 'Recording')) return;

    let okCount = 0;
    let failCount = 0;
    let lastResult = null;
    for (let i = 1; i <= target; i++) {
      if (!camOn) {
        statusEl.textContent = `Recording cancelled. Captured ${okCount}/${target} sample(s).`;
        return;
      }
      statusEl.textContent = `Recording ${i}/${target}... captured ${okCount}`;
      try {
        lastResult = await requestCaptureSample(className);
        okCount++;
        updateCaptureUI(lastResult.count);
      } catch (_) {
        failCount++;
      }
      if (i < target) await sleep(500);
    }

    const handText = lastResult ? ` - last frame: ${lastResult.hand_count} hand(s)` : '';
    statusEl.textContent =
      `Recorded ${okCount}/${target} sample(s) for "${className}"${handText}` +
      (failCount ? `, skipped ${failCount}` : '');
    if (okCount > 0) showToast(`Recorded ${okCount} sample(s)`);
    else showToast('No samples captured. Keep both hands inside the frame.', true);
  } catch (err) {
    const msg = err.message || 'Recording failed. Check that the Flask server is still running.';
    statusEl.textContent = msg;
    showToast(msg, true);
  } finally {
    setCaptureBusy(false);
  }
}

async function commitGesture() {
  const className = document.getElementById('gestureClassName').value.trim();
  if (!className) return showToast('Enter a gesture class name first', true);
  const r = await fetch('/commit_gesture', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({class_name: className}),
  });
  const d = await r.json();
  if (d.ok) {
    updateCaptureUI(0);
    document.getElementById('samplesCount').textContent = d.total_samples;
    setClassOptions(d.classes);
    saveFormState();
    document.getElementById('registerStatus').textContent =
      `Added ${d.added} sample(s) — total ${d.total_samples} in model.`;
    showToast(`"${className}" registered with ${d.added} samples`);
  } else {
    showToast(d.error, true);
  }
}

async function clearPending() {
  await fetch('/clear_pending', {method: 'POST'});
  updateCaptureUI(0);
  document.getElementById('registerStatus').textContent = 'Pending samples cleared.';
}

async function saveTraining() {
  const statusEl = document.getElementById('registerStatus');
  const path = document.getElementById('trainingPath').value.trim();
  statusEl.textContent = 'Saving training data...';
  try {
    const r = await fetch('/save_training', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path}),
    });
    const d = await r.json();
    if (d.ok) {
      if (d.samples !== undefined) document.getElementById('samplesCount').textContent = d.samples;
      if (d.classes) setClassOptions(d.classes);
      if (d.path) document.getElementById('trainingPath').value = d.path;
      saveFormState();
      statusEl.textContent = `Saved ${d.samples} sample(s) to ${d.path}`;
      showToast(`Saved to ${d.path}`);
    } else {
      statusEl.textContent = d.error;
      showToast(d.error, true);
    }
  } catch (_) {
    const msg = 'Save failed. Check that the Flask server is still running.';
    statusEl.textContent = msg;
    showToast(msg, true);
  }
}

async function deleteGestureClass() {
  const className = document.getElementById('deleteClassName').value;
  const statusEl = document.getElementById('registerStatus');
  if (!className) return showToast('Select a gesture class to delete', true);
  if (!confirm(`Delete all samples for "${className}"? Save to disk after this to persist the change.`)) return;

  try {
    const r = await fetch('/delete_gesture', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({class_name: className}),
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('samplesCount').textContent = d.total_samples;
      updateCaptureUI(0);
      setClassOptions(d.classes);
      statusEl.textContent =
        `Deleted ${d.removed} sample(s) for "${className}". Click Save to disk to persist.`;
      showToast(`Deleted "${className}"`);
    } else {
      statusEl.textContent = d.error;
      showToast(d.error, true);
    }
  } catch (_) {
    const msg = 'Delete failed. Check that the Flask server is still running.';
    statusEl.textContent = msg;
    showToast(msg, true);
  }
}

// ── Eval stats ────────────────────────────────────────────────────────────────
async function loadStats() {
  const r = await fetch('/class_stats');
  const d = await r.json();
  const el = document.getElementById('statsArea');

  if (!d.ok) {
    el.textContent = d.error;
    return;
  }

  const data = d.data;
  const overall = (data.accuracy_all * 100).toFixed(1);
  const cls_stats = data.class_statistics || {};

  let html = `<div style="margin-bottom:8px;color:#c0c8e8">Overall accuracy: <strong style="color:#3b82f6">${overall}%</strong>
    &nbsp;·&nbsp; ${data.correct}/${data.total} samples</div>`;

  if (Object.keys(cls_stats).length > 0) {
    html += `<div class="stats-wrap"><table>
      <thead><tr><th>Class</th><th>Total</th><th>Acc</th><th></th></tr></thead><tbody>`;
    for (const [cls, st] of Object.entries(cls_stats).sort()) {
      const acc = st.total > 0 ? st.correct / st.total : 0;
      const pct = (acc * 100).toFixed(0);
      html += `<tr>
        <td><strong>${cls}</strong></td>
        <td>${st.total}</td>
        <td>${pct}%</td>
        <td><span class="acc-bar-wrap"><span class="acc-bar" style="width:${pct}%"></span></span></td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  }

  el.innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  bindFormState();
  const r = await fetch('/status');
  const d = await r.json();
  if (d.training_loaded) {
    setTrainingLoaded(d.training_samples);
    setClassOptions(d.classes);
    if (d.training_path) document.getElementById('trainingPath').value = d.training_path;
  }
  document.getElementById('kVal').value = d.k;
  document.getElementById('metricVal').value = d.metric;
  restoreFormState();
  updateRecordAvailability();
})();
</script>
